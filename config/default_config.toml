# Default configuration for desktop PDF translator
# This file provides example configuration with Vietnamese language priority

[translation]
default_source_lang = "auto"
default_target_lang = "vi"  # Vietnamese as default target
# Argos is the offline default — works without an API key. The sidecar
# auto-promotes this to the matching LLM once the user saves any LLM key.
preferred_service = "argos"
max_pages = 50
max_file_size_mb = 50.0
cache_translations = true
cache_translated_pdfs = true
pdf_cache_max_size_mb = 1000.0
preserve_formatting = true
min_text_length = 5

[argos]
# Offline NMT engine. No API key. Pack downloads (~80 MB) on first use.
model = "argostranslate"

[gui]
window_width = 1200
window_height = 800
theme = "system"
show_advanced_options = false
auto_preview = true
vietnamese_font_priority = true

[processing]
max_workers = 4
timeout_seconds = 300
quality_check = true
backup_originals = true

[openai]
# API key should be set via environment variable OPENAI_API_KEY
api_key = "${OPENAI_API_KEY}"
model = "gpt-4"
temperature = 0.3
max_tokens = 4000

[gemini]
# API key should be set via environment variable GEMINI_API_KEY  
api_key = "${GEMINI_API_KEY}"
model = "gemini-pro"
temperature = 0.3

[rag]
# RAG (Retrieval-Augmented Generation) settings
enabled = false
auto_process_documents = true

# Application metadata
version = "1.0.0"
debug_mode = false